name: personaltrainer
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  image_picker: ^1.2.0
  shared_preferences: ^2.5.3
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0
  lucide_icons: ^0.257.0
  shimmer: ^3.0.0
  dotted_border: ^2.1.0
  provider: ^6.1.2
  flutter_blue_plus: ^1.35.2
  health: ^13.3.1
  permission_handler: ^12.0.3
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/logo.jpg

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.jpg"
